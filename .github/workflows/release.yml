name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller fty-nb.spec
      - run: tar -czf fty-nb-macos-arm64.tar.gz -C dist/fty-nb .
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-macos-arm64
          path: fty-nb-macos-arm64.tar.gz

  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: arch -x86_64 pyinstaller fty-nb.spec
      - run: tar -czf fty-nb-macos-x86_64.tar.gz -C dist/fty-nb .
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-macos-x86_64
          path: fty-nb-macos-x86_64.tar.gz

  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller fty-nb.spec
      - run: tar -czf fty-nb-linux-x86_64.tar.gz -C dist/fty-nb .
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-linux-x86_64
          path: fty-nb-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller fty-nb.spec
      - run: Compress-Archive -Path dist/fty-nb/* -DestinationPath fty-nb-windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-windows
          path: fty-nb-windows.zip

  release:
    needs: [build-macos-arm64, build-macos-x86_64, build-linux-x86_64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Download source tarball and compute SHA256
        id: sha
        run: |
          VERSION="${GITHUB_REF_NAME}"
          curl -sL "https://github.com/HanningWang/mano-skill/archive/refs/tags/${VERSION}.tar.gz" -o source.tar.gz
          echo "source=$(sha256sum source.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: HanningWang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          mkdir -p Formula
          cat > Formula/fty-nb.rb << 'FORMULA_EOF'
          class FtyNb < Formula
            desc "VLA Desktop Automation Client"
            homepage "https://github.com/HanningWang/mano-skill"
            url "https://github.com/HanningWang/mano-skill/archive/refs/tags/VERSION_PLACEHOLDER.tar.gz"
            sha256 "SHA256_PLACEHOLDER"
            version "VERSION_NUM_PLACEHOLDER"

            depends_on "python@3.13"

            def install
              venv = libexec/"venv"
              system "python3.13", "-m", "venv", venv
              system venv/"bin/pip", "install", "-r", "requirements.txt"
              (venv/"src").install Dir["visual"]
              (bin/"fty-nb").write <<~SH
                #!/bin/bash
                export PYTHONPATH="#{venv}/src"
                exec "#{venv}/bin/python3" "#{venv}/src/visual/vla.py" "$@"
              SH
            end

            test do
              assert_match "usage", shell_output("#{bin}/fty-nb --help", 2)
            end
          end
          FORMULA_EOF
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" Formula/fty-nb.rb
          sed -i "s|VERSION_NUM_PLACEHOLDER|${VERSION_NUM}|g" Formula/fty-nb.rb
          sed -i "s|SHA256_PLACEHOLDER|${{ steps.sha.outputs.source }}|g" Formula/fty-nb.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fty-nb.rb
          git commit -m "Update fty-nb to ${GITHUB_REF_NAME}"
          git push
